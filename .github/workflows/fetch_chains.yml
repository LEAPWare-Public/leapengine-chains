name: fetch-chains
on:
  workflow_dispatch:
    inputs:
      tickers:
        description: 'Comma-separated tickers'
        required: true
        default: 'SILJ,SCHD,EPD,AMLP'
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch and filter chains
        env:
          TICKERS: ${{ github.event.inputs.tickers }}
        run: python3 scripts/fetch_chains.py
      - name: Commit results
        run: |
          git config user.name "chain-bot"
          git config user.email "chain-bot@users.noreply.github.com"
          git add data/
          git commit -m "chain snapshot $(date -u +%FT%TZ)" || echo "no changes"
          git push
